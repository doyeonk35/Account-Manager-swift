name: TVAccountManager
options:
  bundleIdPrefix: com.tv
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  defaultConfig: Debug
  developmentLanguage: en
  knownRegions: [en, ko, Base]
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.1.4"
    CURRENT_PROJECT_VERSION: "6"
  configs:
    Debug:
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: F64BRNFSBB
    Release:
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: F64BRNFSBB
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"
targets:
  TVAccountManager:
    type: application
    platform: macOS
    sources:
      - TVAccountManager
    dependencies:
      - package: Sparkle
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: TVAccountManager/TVAccountManager.entitlements
        INFOPLIST_FILE: TVAccountManager/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.tv.account-manager
        PRODUCT_NAME: TVAccountManager
        PRODUCT_MODULE_NAME: TVAccountManager
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.tv.account-manager.debug
          PRODUCT_NAME: TVAccountManager-Debug
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: F64BRNFSBB
  TVAccountManagerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - TVAccountManagerTests
    dependencies:
      - target: TVAccountManager
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tv.account-manager.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
      configs:
        Debug:
          TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TVAccountManager-Debug.app/Contents/MacOS/TVAccountManager-Debug"
        Release:
          TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TVAccountManager.app/Contents/MacOS/TVAccountManager"
