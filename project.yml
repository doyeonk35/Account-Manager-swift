name: TvingLoginManager
options:
  bundleIdPrefix: com.tving
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  defaultConfig: Debug
  developmentLanguage: en
  knownRegions: [en, ko, Base]
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "2"
  configs:
    Debug:
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: F64BRNFSBB
    Release:
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: F64BRNFSBB
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"
targets:
  TvingLoginManager:
    type: application
    platform: macOS
    sources:
      - TvingLoginManager
    dependencies:
      - package: Sparkle
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: TvingLoginManager/TvingLoginManager.entitlements
        INFOPLIST_FILE: TvingLoginManager/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.tving.login-manager
        PRODUCT_NAME: TvingLoginManager
        PRODUCT_MODULE_NAME: TvingLoginManager
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.tving.login-manager.debug
          PRODUCT_NAME: TvingLoginManager-Debug
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: F64BRNFSBB
  TvingLoginManagerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - TvingLoginManagerTests
    dependencies:
      - target: TvingLoginManager
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tving.login-manager.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
      configs:
        Debug:
          TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TvingLoginManager-Debug.app/Contents/MacOS/TvingLoginManager-Debug"
        Release:
          TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TvingLoginManager.app/Contents/MacOS/TvingLoginManager"
